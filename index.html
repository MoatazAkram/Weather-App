<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="./js/script.js" defer></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="site-container">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img class="" src="./images/logo.png" alt="Weather Logo" />
            <div class="logo-type">
              <h3>Weather</h3>
              <span>tagline goes here</span>
            </div>
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#">News</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#"
                  >Live cameras</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#">Photos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="#">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <section class="search-container">
        <div class="container">
          <div class="find-location mb-3">
            <label for="search"></label>
            <input
              class="w-100"
              type="text"
              id="search"
              placeholder="Find your location..."
            />
            <button class="btn search-btn" id="searchBtn">Find</button>
          </div>
        </div>
      </section>

      <section class="forecast-tables">
        <div class="container">
          <div class="forecast-container"></div>
          
        </div>
      </section>

      <footer class="site-footer">
        <div class="container">
          <div class="row">
            <div class="col-md-8 subscribe">
              <label for="subscribe"></label>
              <input
                class="w-100"
                type="text"
                id="subscribe"
                placeholder="Enter your email to subscribe..."
              />
              <button class="btn">Subscribe</button>
            </div>
            <div class="col-md-3 col-md-offset-1">
              <div class="social-links">
                <ul>
                  <li>
                    <a href="#">
                      <i class="fa-brands fa-facebook-f"></i>
                    </a>
                  </li>
                  <li>
                    <a href="#">
                      <i class="fa-brands fa-twitter"></i>
                    </a>
                  </li>
                  <li>
                    <a href="#">
                      <i class="fa-brands fa-google"></i>
                    </a>
                  </li>
                  <li>
                    <a href="#">
                      <i class="fa-brands fa-pinterest"></i>
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
          <p>
            Copyright 2014 Company name. Designed by Themezy. All rights
            reserved
          </p>
        </div>
      </footer>
    </div>
  </body>
</html>
